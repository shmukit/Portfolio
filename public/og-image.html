<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mukit - Product Manager Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 1200px;
            height: 630px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: white;
        }
        
        .container {
            text-align: center;
            padding: 60px;
        }
        
        .name {
            font-size: 72px;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #ffffff, #e0e7ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .title {
            font-size: 32px;
            font-weight: 500;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        
        .tagline {
            font-size: 24px;
            font-weight: 400;
            opacity: 0.8;
            margin-bottom: 40px;
        }
        
        .ethos {
            display: flex;
            justify-content: center;
            gap: 40px;
            font-size: 20px;
            font-weight: 600;
        }
        
        .ethos-item {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }
        
        .wave {
            font-size: 48px;
            margin-left: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="name">
            Mukit<span class="wave">👋</span>
        </div>
        <div class="title">Product Manager Portfolio</div>
        <div class="tagline">Builder & Philomath, learning by doing</div>
        <div class="ethos">
            <div class="ethos-item">Data (analysis)</div>
            <div class="ethos-item">Decision (strategy)</div>
            <div class="ethos-item">Design (service)</div>
        </div>
    </div>
</body>
</html>
